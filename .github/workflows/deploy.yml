name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev

permissions:
  contents: write

jobs:
  # JOB 1: Deploy Main Branch (Legacy 1.0.0) to Root /
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # Copy everything from the root of the main branch
          branch: gh-pages
          target-folder: .
          clean: false # Do not delete the /beta folder if it exists

  # JOB 2: Deploy Dev Branch (Modern 2.x) to /beta
  deploy-beta:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Beta
        run: npm run build
        env:
          # Set base path for the beta version
          VITE_BASE_URL: /Intake-Rapportage-Tool/beta/

      - name: Deploy to /beta
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite build output
          branch: gh-pages
          target-folder: beta
          clean: false # Do not delete the root files
