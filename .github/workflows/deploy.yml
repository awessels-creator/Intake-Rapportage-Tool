name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - dev
  workflow_dispatch: # Allows manual trigger

permissions:
  contents: write

jobs:
  # JOB 1: Deploy Main Branch (Legacy 1.0.0) to Root /
  deploy-prod:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare Prod Folder
        run: |
          mkdir prod_build
          cp index.html prod_build/
          cp -r public prod_build/ || true

      - name: Deploy to Root
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: prod_build
          branch: gh-pages
          target-folder: .
          clean: false

  # JOB 2: Deploy Dev Branch (Modern 2.x) to /beta
  deploy-beta:
    if: github.ref == 'refs/heads/dev'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Beta
        run: npm run build
        env:
          # Set base path for the beta version
          VITE_BASE_URL: /Intake-Rapportage-Tool/beta/

      - name: Fix asset paths for GitHub Pages
        run: |
          sed -i 's|src="/Intake-Rapportage-Tool/beta/|src="./|g' dist/index.html
          sed -i 's|href="/Intake-Rapportage-Tool/beta/|href="./|g' dist/index.html
          sed -i 's|url(/Intake-Rapportage-Tool/beta/|url(./|g' dist/assets/*.css 2>/dev/null || true

      - name: Deploy to /beta
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist # Vite build output
          branch: gh-pages
          target-folder: beta
          clean: false # Do not delete the root files
